<!DOCTYPE html>
<html lang="pt-BR">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css" />
<head>
  <meta charset="UTF-8" />
  <title>Painel de Estudos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="logo">Painel de Estudos</h1>
      <nav>
      <button class="nav-btn active" data-section="dashboard">Dashboard</button>
<button class="nav-btn" data-section="subjects">Matérias</button>
<button class="nav-btn" data-section="settings">Edição de Dados</button>
      </nav>
      <div class="theme-toggle">
        <span>Tema</span>
        <button id="toggle-theme">🌙</button>
      </div>
    </aside>

    <main class="main">
      <!-- DASHBOARD -->
 <section id="dashboard" class="section active">
  <h2>Resumo</h2>
  <div class="stats-grid">
    <div class="card">
      <h3>Total de matérias</h3>
      <p id="total-subjects">0</p>
    </div>
    <div class="card">
      <h3>Horas semanais</h3>
      <p id="total-hours">0h</p>
    </div>
  </div>
  <div style="height: 300px; margin-top: 24px;">
    <canvas id="subjectsChart" width="400" height="300"></canvas>
  </div>
</section>

      <!-- MATÉRIAS -->
      <section id="subjects" class="section">
        <h2>Matérias</h2>

        <form id="subject-form">
          <div class="form-group">
            <label for="name">Nome da matéria</label>
            <input id="name" type="text" required placeholder="Ex: Matemática" />
          </div>

          <div class="form-group">
            <label for="goal">Horas por semana</label>
            <input id="goal" type="number" min="1" required placeholder="Ex: 5" />
          </div>

          <button type="submit" class="primary-btn">Adicionar matéria</button>
        </form>

        <ul id="subject-list" class="subject-list"></ul>
      </section>

      <!-- CONFIGURAÇÕES -->
      <section id="settings" class="section">
        <h2>Edição de Dados</h2>
        <button id="clear-data" class="danger-btn">
          Limpar todos os dados
        </button>
      </section>
    </main>
  </div>

   ...
  <script src="script.js"></script>
</body>
</html>
